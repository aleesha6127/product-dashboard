<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Luxe | Redefining Elegance</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .landing-hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('aura_luxe_hero_bg.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
        }

        .hero-content {
            z-index: 10;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInScale 1.2s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hero-logo {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 1.5rem;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 3rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.1em;
        }

        .shop-now-btn {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background: white;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .shop-now-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.2);
            background: var(--primary-color);
            color: white;
        }

        .features-peek {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 4rem;
            z-index: 10;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .features-peek {
                display: none;
            }
        }
    </style>
</head>

<body class="landing-body">
    <section class="landing-hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-logo">Aura Luxe</div>
            <h1 class="hero-title">ELEVATE<br>YOUR STYLE</h1>
            <p class="hero-subtitle">Curated collections for those who appreciate the finer things.</p>
            <a href="shop.html" class="shop-now-btn">Enter Store</a>
        </div>

        <div class="features-peek">
            <span>Premium Quality</span>
            <span>Fast Shipping</span>
            <span>Secure Checkout</span>
        </div>
    </section>

    <!-- Theme Initialization for JS -->
    <script>
        // Check theme immediately to avoid splash
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>

</html>
