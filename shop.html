<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Aura Luxe</title>
    <meta name="description" content="Redefining elegance. Explore our curated collections.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <h1>Aura<span>Luxe</span></h1>
                </a>

                <div class="nav-controls">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>

                    <a href="wishlist.html" class="cart-btn" title="View Wishlist">
                        <span class="icon">🤍</span>
                        <span id="wishlist-count" class="cart-count">0</span>
                    </a>

                    <div class="wallet-display">
                        <span class="icon">💰</span>
                        <span id="wallet-balance">$0.00</span>
                        <a href="wallet.html" class="add-balance-btn" title="Add Balance">+</a>
                    </div>

                    <a href="cart.html" class="cart-btn">
                        <span class="icon">🛒</span>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="header-content">
                <p>New Collections</p>
                <h2>ELEVATE YOUR EVERYDAY</h2>

                <div class="search-sort-bar">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" placeholder="Search our collection...">
                    </div>

                    <div class="filter-controls">
                        <div class="sort-wrapper">
                            <select id="category-select">
                                <option value="all">All Categories</option>
                                <option value="men's clothing">Men's Clothing</option>
                                <option value="women's clothing">Women's Clothing</option>
                                <option value="jewelery">Jewelery</option>
                                <option value="electronics">Electronics</option>
                            </select>
                        </div>

                        <div class="sort-wrapper">
                            <select id="sort-select">
                                <option value="default">Sort: Default</option>
                                <option value="low-high">Price: Low - High</option>
                                <option value="high-low">Price: High - Low</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="product-grid">
                <!-- Products will be dynamically injected here -->
                <div class="loading-container" id="loader">
                    <span class="spinner"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>

</html>
